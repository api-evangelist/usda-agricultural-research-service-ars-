naftiko: "1.0.0-alpha1"

info:
  label: "USDA Ag Data Commons CKAN API"
  description: >-
    The USDA Ag Data Commons provides open agricultural research datasets through
    a CKAN/DKAN API. Covers ARS national programs including genomics, soil health,
    crop science, animal production, and natural resources.
  tags:
    - Agricultural Research
    - Open Data
    - Datasets
    - Federal Government
  created: "2026-05-03"
  modified: "2026-05-03"

capability:
  consumes:
    - type: http
      namespace: usda-adc
      baseUri: https://data.nal.usda.gov
      description: "USDA Ag Data Commons CKAN API."
      resources:
        - name: dataset-search
          path: /api/action/package_search
          description: "Search agricultural research datasets"
          operations:
            - name: search-datasets
              method: GET
              description: "Search Ag Data Commons catalog for agricultural research datasets"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Search query"
                - name: fq
                  in: query
                  type: string
                  required: false
                  description: "Filter query"
                - name: rows
                  in: query
                  type: integer
                  required: false
                  description: "Number of results (max 1000)"
                - name: start
                  in: query
                  type: integer
                  required: false
                  description: "Offset for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: dataset-detail
          path: /api/action/package_show
          description: "Dataset detail by ID"
          operations:
            - name: get-dataset
              method: GET
              description: "Get full metadata for a specific dataset"
              inputParameters:
                - name: id
                  in: query
                  type: string
                  required: true
                  description: "Dataset ID or name slug"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: datastore-search
          path: /api/action/datastore_search
          description: "Query data records within a dataset resource"
          operations:
            - name: query-datastore
              method: GET
              description: "Query tabular data records within a published dataset"
              inputParameters:
                - name: resource_id
                  in: query
                  type: string
                  required: true
                  description: "Resource ID to query"
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Search query"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Rows to return"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: usda-adc-api
      resources:
        - path: /v1/datasets
          name: datasets
          description: "Agricultural research datasets"
          operations:
            - method: GET
              name: search-datasets
              description: "Search agricultural research datasets"
              call: "usda-adc.search-datasets"
              with:
                q: "rest.q"
                rows: "rest.rows"
                start: "rest.start"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: usda-adc-mcp
      transport: http
      tools:
        - name: search-ag-datasets
          description: "Search USDA Ag Data Commons for agricultural research datasets"
          hints:
            readOnly: true
            openWorld: true
          call: "usda-adc.search-datasets"
          with:
            q: "tools.q"
            rows: "tools.rows"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-ag-dataset
          description: "Get full metadata for a specific agricultural research dataset"
          hints:
            readOnly: true
            openWorld: false
          call: "usda-adc.get-dataset"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: query-dataset-records
          description: "Query tabular data records within a specific dataset resource"
          hints:
            readOnly: true
            openWorld: false
          call: "usda-adc.query-datastore"
          with:
            resource_id: "tools.resource_id"
            q: "tools.q"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
