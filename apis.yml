apis:
  - aid: usda-agricultural-research-service-ars-:fooddata-central-api
    name: USDA FoodData Central API
    tags:
      - Food Data
      - Nutrition
      - Agriculture
      - Federal Government
      - Open Data
    humanURL: https://fdc.nal.usda.gov/api-guide/
    properties:
      - url: https://fdc.nal.usda.gov/api-guide/
        type: Documentation
      - url: https://fdc.nal.usda.gov/portal-data/external/apispec
        type: OpenAPI
      - url: >-
          https://raw.githubusercontent.com/api-evangelist/usda-agricultural-research-service-ars-/refs/heads/main/openapi/usda-ars-fooddata-central-openapi.yml
        type: OpenAPI
    description: >-
      The USDA FoodData Central (FDC) API provides access to an integrated
      data system containing extended nutritional and food component data for
      thousands of foods. Data types include Foundation Foods, SR Legacy,
      Survey Foods (FNDDS), Branded Foods, and Experimental Foods. Requires
      a free data.gov API key.
  - aid: usda-agricultural-research-service-ars-:ag-data-commons-ckan-api
    name: USDA Ag Data Commons CKAN API
    tags:
      - Agricultural Research
      - Open Data
      - Datasets
      - CKAN
      - Federal Government
    humanURL: https://agdatacommons.nal.usda.gov
    properties:
      - url: https://agdatacommons.nal.usda.gov
        type: Portal
      - url: https://data.nal.usda.gov/about-ag-data-commons
        type: Documentation
      - url: >-
          https://raw.githubusercontent.com/api-evangelist/usda-agricultural-research-service-ars-/refs/heads/main/openapi/usda-ars-ag-data-commons-openapi.yml
        type: OpenAPI
    description: >-
      The USDA Ag Data Commons is a DKAN/CKAN-based open data repository for
      USDA agricultural research datasets. The API provides metadata search
      and retrieval for datasets from ARS national programs including
      genomics, crop science, soil health, animal production, and more.
      No authentication required for read access.
