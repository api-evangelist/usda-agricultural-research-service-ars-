description: >-
  The USDA Agricultural Research Service (ARS) conducts research to develop and implement
  solutions to agricultural problems. Specifically, ARS scientists conduct research
  in areas such as crop protection, animal health, food safety, natural resource management,
  and sustainable agriculture. Their work aims to improve crop yields, develop new
  technologies, and find ways to reduce the environmental impact of agriculture.
