description: >-
  The USDA Agricultural Research Service (ARS) is the principal in-house research
  agency of the US Department of Agriculture. ARS conducts research to develop and
  implement solutions to agricultural problems that affect Americans every day.
  Research areas include crop protection, animal health, food safety, natural resource
  management, sustainable agriculture, and nutrition. ARS provides public data
  access through FoodData Central (nutrition data) and the Ag Data Commons
  (agricultural research datasets repository with CKAN/DKAN API).
